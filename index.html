<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Web Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">User Database Interface</h1>

        <!-- Insert Record -->
        <div class="card mb-4">
            <div class="card-header">Insert New User</div>
            <div class="card-body">
                <form id="insertForm">
                    <div class="row">
                        <div class="col-md-3">
                            <input type="number" class="form-control" id="insertId" placeholder="ID" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="insertName" placeholder="Name" required>
                        </div>
                        <div class="col-md-3">
                            <input type="email" class="form-control" id="insertEmail" placeholder="Email" required>
                        </div>
                        <div class="col-md-3">
                            <input type="number" class="form-control" id="insertAge" placeholder="Age" required>
                        </div>
                        <div class="col-md-3 mt-3 mt-md-0">
                            <input type="number" class="form-control" id="insertDepartmentId" placeholder="Department ID (optional)">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Insert</button>
                </form>
            </div>
        </div>

        <!-- Departments -->
        <div class="card mb-4">
            <div class="card-header">Departments</div>
            <div class="card-body">
                <form id="departmentForm" class="mb-3">
                    <div class="row">
                        <div class="col-md-5">
                            <input type="number" class="form-control" id="departmentId" placeholder="Department ID" required>
                        </div>
                        <div class="col-md-5 mt-2 mt-md-0">
                            <input type="text" class="form-control" id="departmentName" placeholder="Department Name" required>
                        </div>
                        <div class="col-md-2 mt-2 mt-md-0">
                            <button type="submit" class="btn btn-success w-100">Save</button>
                        </div>
                    </div>
                </form>
                <button id="loadDepartmentsBtn" class="btn btn-outline-secondary btn-sm mb-2">Load Departments</button>
                <ul class="list-group" id="departmentsList"></ul>
            </div>
        </div>

        <!-- Assign Department -->
        <div class="card mb-4">
            <div class="card-header">Assign User To Department</div>
            <div class="card-body">
                <form id="assignDepartmentForm">
                    <div class="row">
                        <div class="col-md-5">
                            <input type="number" class="form-control" id="assignUserId" placeholder="User ID" required>
                        </div>
                        <div class="col-md-5 mt-2 mt-md-0">
                            <input type="number" class="form-control" id="assignDepartmentId" placeholder="Department ID" required>
                        </div>
                        <div class="col-md-2 mt-2 mt-md-0">
                            <button type="submit" class="btn btn-warning w-100">Assign</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Select All Records -->
        <div class="card mb-4">
            <div class="card-header">Select All Users</div>
            <div class="card-body">
                <button id="selectAllBtn" class="btn btn-secondary">Load All Users</button>
                <table class="table table-striped mt-3" id="recordsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Select by ID -->
        <div class="card mb-4">
            <div class="card-header">Select User by ID</div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="number" class="form-control" id="selectId" placeholder="Enter ID">
                    <button class="btn btn-info" id="selectByIdBtn">Select</button>
                </div>
                <div id="selectedRecord"></div>
            </div>
        </div>

        <!-- Delete Record -->
        <div class="card mb-4">
            <div class="card-header">Delete User by ID</div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="number" class="form-control" id="deleteId" placeholder="Enter ID">
                    <button class="btn btn-danger" id="deleteBtn">Delete</button>
                </div>
            </div>
        </div>

        <!-- Join View -->
        <div class="card mb-4">
            <div class="card-header">Join: Users + Departments</div>
            <div class="card-body">
                <button id="loadJoinBtn" class="btn btn-dark">Load Joined Data</button>
                <table class="table table-striped mt-3" id="joinTable">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Department ID</th>
                            <th>Department Name</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages"></div>
    </div>

    <script>
        const insertForm = document.getElementById('insertForm');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const selectByIdBtn = document.getElementById('selectByIdBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const departmentForm = document.getElementById('departmentForm');
        const loadDepartmentsBtn = document.getElementById('loadDepartmentsBtn');
        const departmentsList = document.getElementById('departmentsList');
        const assignDepartmentForm = document.getElementById('assignDepartmentForm');
        const loadJoinBtn = document.getElementById('loadJoinBtn');
        const joinTableBody = document.querySelector('#joinTable tbody');
        const recordsTableBody = document.querySelector('#recordsTable tbody');
        const selectedRecordDiv = document.getElementById('selectedRecord');
        const messagesDiv = document.getElementById('messages');

        function showMessage(message, type = 'info') {
            messagesDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => messagesDiv.innerHTML = '', 5000);
        }

        insertForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('insertId').value;
            const name = document.getElementById('insertName').value;
            const email = document.getElementById('insertEmail').value;
            const age = document.getElementById('insertAge').value;
            const departmentId = document.getElementById('insertDepartmentId').value;

            const data = `id=${id}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&age=${age}&department_id=${departmentId || -1}`;
            try {
                const response = await fetch('http://127.0.0.1:8080/insert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: data
                });
                const data2 = await response.json();
                showMessage(data2.message, data2.success ? 'success' : 'danger');
                if (data2.success) insertForm.reset();
            } catch (error) {
                showMessage('Error inserting record', 'danger');
            }
        });

        selectAllBtn.addEventListener('click', async () => {
            try {
                const response = await fetch('http://127.0.0.1:8080/select');
                const records = await response.json();
                recordsTableBody.innerHTML = records.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.name}</td>
                        <td>${r.email}</td>
                        <td>${r.age}</td>
                    </tr>
                `).join('');
            } catch (error) {
                showMessage('Error loading records', 'danger');
            }
        });

        selectByIdBtn.addEventListener('click', async () => {
            const id = document.getElementById('selectId').value;
            if (!id) return;
            try {
                const response = await fetch(`http://127.0.0.1:8080/select/${id}`);
                if (response.ok) {
                    const record = await response.json();
                    selectedRecordDiv.innerHTML = `
                        <div class="card">
                            <div class="card-body">
                                <h5>User ID: ${record.id}</h5>
                                <p>Name: ${record.name}</p>
                                <p>Email: ${record.email}</p>
                                <p>Age: ${record.age}</p>
                                <p>Department: ${record.department_name} (${record.department_id})</p>
                            </div>
                        </div>
                    `;
                } else {
                    selectedRecordDiv.innerHTML = '<div class="alert alert-warning">User not found</div>';
                }
            } catch (error) {
                showMessage('Error selecting record', 'danger');
            }
        });

        deleteBtn.addEventListener('click', async () => {
            const id = document.getElementById('deleteId').value;
            if (!id) return;
            try {
                const response = await fetch(`http://127.0.0.1:8080/delete/${id}`, { method: 'DELETE' });
                const data = await response.json();
                showMessage(data.message, data.success ? 'success' : 'danger');
                if (data.success) document.getElementById('deleteId').value = '';
            } catch (error) {
                showMessage('Error deleting record', 'danger');
            }
        });

        departmentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('departmentId').value;
            const name = document.getElementById('departmentName').value;
            const payload = `id=${id}&name=${encodeURIComponent(name)}`;

            try {
                const response = await fetch('http://127.0.0.1:8080/insert-department', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: payload
                });
                const data = await response.json();
                showMessage(data.message, data.success ? 'success' : 'danger');
                if (data.success) {
                    departmentForm.reset();
                }
            } catch (error) {
                showMessage('Error saving department', 'danger');
            }
        });

        loadDepartmentsBtn.addEventListener('click', async () => {
            try {
                const response = await fetch('http://127.0.0.1:8080/departments');
                const departments = await response.json();
                departmentsList.innerHTML = departments.map(d => `<li class="list-group-item">${d.id} - ${d.name}</li>`).join('');
            } catch (error) {
                showMessage('Error loading departments', 'danger');
            }
        });

        assignDepartmentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('assignUserId').value;
            const departmentId = document.getElementById('assignDepartmentId').value;
            const payload = `user_id=${userId}&department_id=${departmentId}`;

            try {
                const response = await fetch('http://127.0.0.1:8080/assign-department', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: payload
                });
                const data = await response.json();
                showMessage(data.message, data.success ? 'success' : 'danger');
                if (data.success) {
                    assignDepartmentForm.reset();
                }
            } catch (error) {
                showMessage('Error assigning department', 'danger');
            }
        });

        loadJoinBtn.addEventListener('click', async () => {
            try {
                const response = await fetch('http://127.0.0.1:8080/join/users-departments');
                const rows = await response.json();
                joinTableBody.innerHTML = rows.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.name}</td>
                        <td>${r.email}</td>
                        <td>${r.age}</td>
                        <td>${r.department_id}</td>
                        <td>${r.department_name}</td>
                    </tr>
                `).join('');
            } catch (error) {
                showMessage('Error loading join data', 'danger');
            }
        });
    </script>
</body>
</html>
